<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page</title>
</head>
<body>

    <!-- Autre contenu HTML ici -->
    truc random
    <div id="exportableContent">
        <!-- Votre contenu à exporter ici -->
        <h1>Mon Widget Exportable</h1>
        <p>Ceci est une partie de ma page que je veux exporter.</p>
    </div>

    <script>
        // Fonction pour générer une fenêtre avec le contenu exportable
        function genererFenetreExportable() {
            // Créer un élément div pour isoler le contenu exportable
            var divExportable = document.createElement('div');
            divExportable.innerHTML = document.getElementById('exportableContent').innerHTML;

            // Créer une nouvelle fenêtre ou onglet
            var nouvelleFenetre = window.open('', '_blank');

            // Ajouter le contenu exportable à la nouvelle fenêtre
            nouvelleFenetre.document.body.appendChild(divExportable);
        }
    </script>

    <button onclick="genererFenetreExportable()">Générer la fenêtre</button>

</body>
</html>
