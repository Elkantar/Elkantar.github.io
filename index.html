<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exporter la Div</title>
</head>
<body>

    <!-- Autre contenu HTML ici -->
    random things
    <div id="exportableContent">
        <!-- Votre contenu à exporter ici -->
        <h1>Mon Widget Exportable</h1>
        <p>Ceci est une partie de ma page que je veux exporter.</p>
    </div>

    <!-- Bouton pour générer l'iframe -->
    <button onclick="genererIframe()">Générer iframe</button>

    <!-- Script pour générer l'iframe -->
    <script>
        function genererIframe() {
            // Récupérer le contenu de la div exportableContent
            var contenuExportable = document.getElementById('exportableContent').outerHTML;

            // Générer l'iframe avec le contenu de la div
            var iframe = document.createElement('iframe');
            iframe.src = 'data:text/html;charset=utf-8,' + encodeURI('<html><head><title>Exportable Content</title></head><body>' + contenuExportable + '</body></html>');
            iframe.width = '100%';
            iframe.height = '300px';

            // Ajouter l'iframe à la page
            document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
