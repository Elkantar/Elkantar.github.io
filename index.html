<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page</title>
</head>
<body>

    <!-- Autre contenu HTML ici -->
    truc random
    <div id="exportableContent">
        <!-- Votre contenu à exporter ici -->
        <h1>Mon Widget Exportable</h1>
        <p>Ceci est une partie de ma page que je veux exporter.</p>
    </div>

    <script>
        // Fonction pour générer le code iframe avec le contenu exportable et une URL dynamique
        function genererCodeIframe() {
            // Récupérer uniquement le contenu de la div exportableContent
            var contenuExportable = document.getElementById('exportableContent').outerHTML;

            // Générer une URL dynamique pour le contenu exportable (vous pouvez ajuster l'URL selon vos besoins)
            var urlExportable = 'https://elkantar.github.io/?content=' + encodeURIComponent(contenuExportable);

            // Générer le code iframe avec l'URL dynamique
            var codeIframe = '<iframe src="' + urlExportable + '" style="width:100%; height:100%; border:none;"></iframe>';

            // Afficher le code généré (vous pouvez l'ajuster selon vos besoins)
            alert('Code iframe généré :\n\n' + codeIframe);
        }
    </script>

    <button onclick="genererCodeIframe()">Générer le code iframe</button>

</body>
</html>
