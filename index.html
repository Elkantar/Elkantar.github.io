<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page</title>
</head>
<body>

    <!-- Autre contenu HTML ici -->

    <div id="exportableContent">
        <!-- Votre contenu à exporter ici -->
        <h1>Mon Widget Exportable</h1>
        <p>Ceci est une partie de ma page que je veux exporter.</p>
    </div>

    <script>
        // Fonction pour générer l'URL de l'iframe avec un ancre spécifique
        function genererURLExportableContent() {
            // Construire l'URL avec l'ancre spécifique
            var url = "https://elkantar.github.io/#exportableContent";
            
            // Ouvrir l'URL dans une nouvelle fenêtre ou onglet
            window.open(url, '_blank');
        }
    </script>

    <button onclick="genererURLExportableContent()">Générer l'URL</button>

</body>
</html>
