<!DOCTYPE html>
<html>

<head>
    <title>Exporter un widget</title>
    <!-- Inclure les styles CSS -->
    <style>
        /* Vos styles pour le widget */
        .widget {
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
            height: 200px;
            /* Autres styles... */
        }
    </style>
</head>

<body>

    <h1>Ma page avec un widget</h1>

    <!-- Contenu de votre page -->
    <div class="widget">
        <!-- Votre contenu de widget va ici -->
        <h2>Mon super widget</h2>
        <p>Contenu du widget...</p>
    </div>

    <!-- Section pour l'intégration -->
    <div class="integration-code">

        <h2>Exporter ce widget</h2>
        <div id="exportableContent">
            <textarea id="iframeCode" rows="5" cols="50" readonly></textarea>
        </div>
        <!--<button onclick="generateCode()">Générer le code
                d'intégration</button>-->
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', function () {
            // Récupérez l'élément à exporter
            var exportableContent = document.getElementById('exportableContent');

            // Générez le code iframe
            var iframeCode = '<iframe srcdoc="' + exportableContent.innerHTML + '" width="100%" height="300px" frameborder="0"></iframe>';

            // Ajoutez le code iframe à la page
            document.body.insertAdjacentHTML('beforeend', iframeCode);
        });
    </script>
</body>

</html>
