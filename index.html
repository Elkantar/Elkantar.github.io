<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exporter la Div</title>
</head>
<body>

    <!-- Autre contenu HTML ici -->
    random things
    <div id="exportableContent">
        <!-- Votre contenu à exporter ici -->
        <h1>Mon Widget Exportable</h1>
        <p>Ceci est une partie de ma page que je veux exporter.</p>
        <a href="getleaz.com">Powered by Getleaz</a>
    </div>

    <!-- Bouton pour générer l'iframe -->
    <button onclick="genererIframe()">Générer iframe</button>

    <!-- Div pour afficher l'iframe générée -->
    <div id="iframeContainer"></div>

    <!-- Script pour générer et afficher l'iframe -->
    <script>
        function genererIframe() {
            // Récupérer le contenu de la div exportableContent
            var contenuExportable = document.getElementById('exportableContent').outerHTML;

            // Générer la balise iframe avec le contenu de la div
            var iframeCode = '<iframe src="data:text/html;charset=utf-8,' + encodeURI('<html><head><title>Exportable Content</title></head><body>' + contenuExportable + '</body></html>') + '" width="100%" height="300px"></iframe>';

            // Afficher la balise iframe dans la div iframeContainer
            document.getElementById('iframeContainer').innerText = iframeCode;
        }
    </script>

</body>
</html>
